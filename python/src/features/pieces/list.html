{% extends "templates/layouts/base.html" %}

{% block title %}Pieces — Kintsugi{% endblock %}

{% block content %}
<section class="pieces">
    <h1>Pieces</h1>

    <form hx-post="/pieces/register" hx-target="#piece-list" hx-swap="outerHTML" class="register-form">
        <input type="text" name="title" placeholder="Describe a piece..." required>
        <button type="submit">Register</button>
    </form>

    <div id="piece-list">
        {% include "features/pieces/_piece_list.html" %}
    </div>
</section>
{% endblock %}
